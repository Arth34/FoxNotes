<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fox Notes</title>
    <link rel="icon" type="image/png" href="../assets/foxIcon.png" />
    <link rel="stylesheet" href="style.css" class="css" />
    <script src="app.js" defer></script>
  </head>
  <body>
    <header>
      <video id="videoBackground" autoplay loop muted playsinline>
        <source src="../assets/lightMode.mp4" type="video/mp4" />
      </video>
      <div class="header-container">
        <div class="logo-container">
          <h1>Fox Notes</h1>
          <img class="fox-icon" src="../assets/foxIcon.png" alt="" />
        </div>
        <div class="buttons-container">
          <button class="add-note-btn" onclick="openNoteDialog()">+ Add Note</button>
          <button id="themeToggleBtn" class="theme-toggle-btn">🌙</button>
        </div>
      </div>
    </header>
    <main>
      <div id="notesContainer" class="notes-grid"></div>
    </main>
    <footer>
      <div class="links-container">
        <p>©Copyright</p>
      </div>
      <div class="links-container">
        <p>Created by <a target="_blank" href="https://github.com/Arth34">Arthur</a></p>
      </div>
      <div class="links-container">
        <p>
          <a target="_blank" href="https://icons8.com/icon/UGuSe9vwcVrg/fox">Fox</a> icon by
          <a target="_blank" href="https://icons8.com">Icons8</a>
        </p>
      </div>
      <div class="links-container">
        <p>Wallpapers by <a target="_blank" href="https://moewalls.com/category/pixel-art/">MoeWalls</a></p>
      </div>
    </footer>
    <dialog id="noteDialog">
      <div class="dialog-content">
        <div class="dialog-header">
          <h2 class="dialog-title" id="dialogTitle">Add New Note</h2>
          <button class="close-btn" onclick="closeNoteDialog()">x</button>
        </div>

        <form id="noteForm">
          <div class="form-group">
            <label for="noteTitle" class="form-label">Title</label>
            <input type="text" id="noteTitle" class="form-input" placeholder="Enter note title..." required />
          </div>

          <div class="form-group">
            <label for="noteContent" class="form-label">Content</label>
            <textarea id="noteContent" class="form-textarea" placeholder="Write your note here..." required></textarea>
          </div>

          <div class="dialog-actions">
            <button type="button" class="cancel-btn" onclick="closeNoteDialog()">Cancel</button>
            <button type="submit" class="save-btn">Save Note</button>
          </div>
        </form>
      </div>
    </dialog>
  </body>
</html>
